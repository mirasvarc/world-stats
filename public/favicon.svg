<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="globe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.5" stop-color="#0ea5a3"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- pozadí (zaoblený čtverec) -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- glóbus -->
  <g transform="translate(32 32)">
    <circle r="18" fill="url(#globe)"/>
    <!-- drátěná síť: rovník + poledníky -->
    <g fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.5">
      <circle r="18"/>
      <ellipse rx="18" ry="6.5"/>
      <ellipse rx="6.5" ry="18"/>
      <ellipse rx="13" ry="18"/>
    </g>
    <!-- značka vybrané země -->
    <circle cx="-7" cy="-6" r="4.5" fill="#2563eb" stroke="#ffffff" stroke-width="2"/>
  </g>
</svg>
